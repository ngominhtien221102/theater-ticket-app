services:
  postgres:
    image: postgres:16-alpine
    container_name: theater_ticketing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: theater_ticketing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Bangkok
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d theater_ticketing"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
